services:
  grader_web:
    build:
      context: .
      dockerfile: Dockerfile-php
    container_name: grader_web
    restart: unless-stopped
    labels:
      # Traefik configuration
      - "traefik.enable=true"
      # HTTP configuration for localhost
      - "traefik.http.routers.grader-http.rule=Host(`grader.localhost`)"
      - "traefik.http.routers.grader-http.entrypoints=web"
      - "traefik.http.services.grader-service.loadbalancer.server.port=80"
      # HTTPS configuration for external domain
      - "traefik.http.routers.grader-https.rule=Host(`grader.pondja.com`,`grader.morkorkai.dev`) && !PathPrefix(`/file/judge/`)"
      - "traefik.http.routers.grader-https.entrypoints=websecure"
      - "traefik.http.routers.grader-https.tls=true"
      - "traefik.http.routers.grader-https.tls.certresolver=myresolver"
      - "traefik.http.routers.grader-https.service=grader-service"
      # Explicitly tell Traefik which network to use
      - "traefik.docker.network=traefik_network"
    volumes:
      - ./web:/var/www/html
      - ./file:/var/www/html/file
      - ./apache-vhost.conf:/etc/apache2/sites-available/000-default.conf
      - ./conf.php:/var/www/html/static/functions/conf.php
      - ./conf.mail.php:/var/www/html/static/functions/mail/conf.php
      - ./conf.oauth.php:/var/www/html/oauth/conf.php
    depends_on:
      - grader_db
    networks:
      - traefik_network
      - grader_network

  grader_db:
    image: mysql:8.0
    container_name: grader_db
    restart: unless-stopped
    ports:
    - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_SCHEMA}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - grader_db_data:/var/lib/mysql
    networks:
      - grader_network

  grader_service:
    build:
      context: .
      dockerfile: Dockerfile-grader
    container_name: grader_service
    restart: unless-stopped
    depends_on:
      - grader_db
    volumes:
      - ./file:/file
      - ./db:/db
      - .env:/app/.env
    networks:
      - grader_network

networks:
  traefik_network:
    external: true
  grader_network:
    driver: bridge

volumes:
  grader_db_data:
