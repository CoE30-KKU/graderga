compareCompile:
  - <<!Cpp:BIN_FILE>>
  - -O2 -std=c++17 "/app/Garedami/StandardJudge/StdCMP.cpp" -o "<<Cur_Problem>>/StdCheckBin"
compareRun:
  - '"<<Cur_Problem>>/StdCheckBin"'
  - ""
compiling:
  C:
    - '"<<!C:BIN_FILE>>"'
    - -O2 "<<Cur_Src>>" -o "<<Cur_Bin>>" -lm
  Cpp:
    - '"<<!Cpp:BIN_FILE>>"'
    - -O2 -std=c++17 "<<Cur_Src>>" -o "<<Cur_Bin>>"
  Java:
    - '"<<!Java:BIN_PATH>>/javac"'
    - -sourcepath "<<Cur_Problem>>/CompileSpace" "<<Cur_Src>>"
  Python:
    - '"<<!Python:BIN_FILE>>"'
    - -m py_compile "<<Cur_Src>>"
judgingCompile:
  - <<!Python:BIN_FILE>>
  - -m py_compile "/app/Garedami/StandardJudge/StdJudge.py"
judgingRun:
  - <<!Python:BIN_FILE>>
  - '"/app/Garedami/StandardJudge/StdJudge.py"'
running:
  C:
    - '"<<Cur_Bin>>"'
    - ""
  Cpp:
    - '"<<Cur_Bin>>"'
    - ""
  Java:
    - '"<<!Java:BIN_FILE>>"'
    - -cp "<<Cur_Problem>>/CompileSpace" <<Cur_JClass>>
  Python:
    - '"<<!Python:BIN_FILE>>"'
    - '"<<Cur_Src>>"'
